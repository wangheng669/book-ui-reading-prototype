name: Deploy prototype to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            content-pipeline/pnpm-lock.yaml
            prototype/pnpm-lock.yaml
      - run: pnpm --dir content-pipeline install --frozen-lockfile
      - run: pnpm --dir content-pipeline generate
      - run: pnpm --dir content-pipeline test
      - run: pnpm --dir prototype install --frozen-lockfile
      - run: pnpm --dir prototype build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype/dist
      - id: deployment
        uses: actions/deploy-pages@v4
